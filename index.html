<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Keptt — Every moment, kept.</title>
<meta name="description" content="Create a shared space for any event. Everyone snaps, everyone sees — and every moment is kept in one collective gallery." />
<link rel="icon" href="/assets/icon.png" />
<link rel="apple-touch-icon" href="/assets/icon.png" />
<meta property="og:title" content="Keptt — Every moment, kept." />
<meta property="og:description" content="One shared gallery for every event. Everyone snaps, everyone sees." />
<meta property="og:image" content="https://keptt-app.com/assets/icon.png" />
<style>
  :root { color-scheme: light dark; }
  * { margin: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100svh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    padding: 48px 24px; gap: 28px;
    color: #1F231A; background: #F6F5EC;
  }
  .wordmark { width: min(340px, 78vw); height: auto; }
  h1 { font-size: clamp(1.3rem, 4vw, 1.7rem); font-weight: 700; color: #5C6638; }
  p.blurb { max-width: 430px; line-height: 1.6; color: #767B69; font-size: 1.02rem; }
  .badge {
    display: inline-block; padding: 12px 26px; border-radius: 999px;
    background: #5C6638; color: #fff; font-weight: 700; text-decoration: none;
    font-size: 0.95rem; letter-spacing: 0.2px;
  }
  .badge span { color: #FF9EC4; }
  footer { position: fixed; bottom: 22px; left: 0; right: 0; display: flex;
           justify-content: center; gap: 22px; font-size: 0.85rem; }
  footer a { color: #767B69; text-decoration: none; }
  footer a:hover { color: #5C6638; }
  @media (prefers-color-scheme: dark) {
    body { color: #F1F2E7; background: #12140E; }
    h1 { color: #B4C382; }
    p.blurb { color: #969B84; }
    .badge { background: #B4C382; color: #1C2410; }
    .badge span { color: #C4285E; }
    footer a { color: #969B84; }
    footer a:hover { color: #B4C382; }
  }
</style>
</head>
<body>
  <img class="wordmark" src="/assets/wordmark.png" alt="keptt" />
  <h1>Every moment, kept.</h1>
  <p class="blurb">Create a shared space for any event. Everyone snaps, everyone
  sees — and every moment is kept in one collective gallery.</p>
  <a class="badge" href="mailto:support@keptt-app.com">Coming soon to the App&nbsp;Store <span>♥</span></a>
  <footer>
    <a href="/terms/">Terms</a>
    <a href="/privacy/">Privacy</a>
    <a href="mailto:support@keptt-app.com">Contact</a>
  </footer>
</body>
</html>
